<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<title>Web Apps-4-HW</title>
	<style>
		body{border:1px solid gray;}
	</style>
</head>
<body>
<h1>My Favorites</h1>
<h2>My Favorite Colors</h2>

<ol id="colorsList">
	
</ol>

<h2>My Favorite Foods</h2>

<ol id="foodsList">
	
</ol>

<h2>My Favorite Links</h2>

<ol id="linksList">
	
</ol>

<script>
    "use strict";
    let colors = ["maroon","sage","turquoise","light purple"];
    let foods = ["pizza", "topokki", "kimchi fried rice", "lemon rice", "udon noodles"]; // add some foods

    // Optional - can you figure out how to pull both the key AND the value
    // from the `links` object literal?
    let links = {
            "RIT": "http://www.rit.edu",
            "RWAG" : "https://www.facebook.com/RWAGclub",
            "New Media Club" : "http://newmediaclub.cias.rit.edu"
        }

    function createList(listElement, array =["puppydogs", "butterflies", "lollipops"]){
        for(let i of array){
            let li = document.createElement("li");
            li.innerHTML = i;
            listElement.appendChild(li);
        }
        
    }
    let colorList = document.getElementById("colorsList");
    let foodList = document.getElementById("foodsList");
    let linkList = document.getElementById("linksList");

    createList(colorList, colors); 
    createList(foodList, foods); 

    for(let l in links){
        let li = document.createElement("li")
        let a = document.createElement("a")
        console.log(links[l]);
        a.setAttribute("href", links[l]);
        a.innerHTML = l;
        li.appendChild(a);
        linkList.appendChild(li);


    }
</script>
</body>
</html>
