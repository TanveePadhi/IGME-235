<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Web Apps Tutorial 7 Exercise</title>
    <style>
        li {
            text-transform: capitalize;
        }
    </style>
    <script>
        "use strict"

        let monsters = [];      // our array of monsters

        /**
         * Our onload Event.
         * 
         */
        window.onload = function () {
            makeSampleMonsters();
            showMonsters("Goomba", "#goombas");
            showMonsters("Boo","#boos");
        }

        /**
         * Create a set of Sample Monsters.
         * 
         */
        function makeSampleMonsters() {
            let monster;

            monster = makeGoomba("John", 20, 30, 100, "Goomba");
            monsters.push(monster);
            monster = makeGoomba("Fred", 30, 100, 150, "Goomba");
            monsters.push(monster);
            monster = makeGoomba("Alice", 40, 150, 200, "Goomba");
            monsters.push(monster);

            /*adding some boos*/
            monster = makeBoo("Arin", 50, 30, 200, "Boo");
            monsters.push(monster);
            monster = makeBoo("Fraya", 20, 40, 150, "Boo");
            monsters.push(monster);
            monster = makeBoo("Fin", 100, 50, 250, "Boo");
            monsters.push(monster);
            monster = makeBoo("Zoran", 60, 45, 180, "Boo");
            monsters.push(monster);
        }

        /**
         * Function that shows our monsters (just Goombas for now)
         * 
         */
        function showMonsters(type, idSelector) {
            let list = document.querySelector(`${idSelector}`);

            for (let i = 0; i < monsters.length; i++) {
                /* checks the type before adding to the list*/
                if(monsters[i].type == type){
                    let liStr = "";
                    let li = document.createElement("li");

                    for (let key in monsters[i]) {
                        if (typeof monsters[i][key] !== "function") {
                            liStr += `<b>${key}:</b> ${monsters[i][key]}<br />`;
                        }
                    }
                    li.innerHTML = liStr;
                    list.appendChild(li);
                }

            }
        }

        /**
         * create our base monster object with defaults.
         * 
         */
        function createBaseMonster() {
            return {
                name: "",
                hp: 100,
                speed: 10,
                score: 100,
                type: "",
                status: function () {
                    console.log("name: " + this.name + ", hp: " + this.hp + ", speed: " + this.speed + ", score: " + this.score);
                }
            }
        }

        /**
         * Create a Goomba.
         * 
         */
        function makeGoomba(name, hp, speed, score, type) {
            let goomba = createBaseMonster();
            goomba.name = name;
            goomba.hp = hp;
            goomba.speed = speed;
            goomba.score = score;
            goomba.takeDamage = function (dmgVal) {
                goomba.hp -= dmgVal;
            }
            goomba.powerUp = powerUp;
            goomba.type = type;
            Object.seal(goomba);
            return goomba;
        }

        /**
         * Function that can be used inside a monster object.
         * 
         */
        function powerUp(val) {
            this.speed += val;
            this.hp += val
            this.status();
        };

        /**
        * Create a Boo
        *  
        */
        function makeBoo(name, hp, speed, score, type){
            let boo = createBaseMonster();
            boo.name = name;
            boo.hp = hp;
            boo.speed = speed;
            boo.score = score;
            boo.takeDamage = function (dmgVal) {
                boo.hp -= dmgVal;
            }
            boo.powerUp = powerUp;
            boo.type = type;
            Object.seal(boo);
            return boo;

        }

    </script>
</head>

<body>
    <div id="lineUp">
        <h1>Goombas</h1>
        <ul id="goombas">
        </ul>
        <h1>Boos</h1>
        <ul id="boos">

        </ul>
    </div>
</body>

</html>
